name: MarketBot Daily Run

on:
  schedule:
    # Runs at 10:30 AM UTC, exactly 4:00 PM IST (After Indian Market Close)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write # Crucial: Allows the bot to save its trades back to your repo

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Added this here for consistency!

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Robot
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_SECRET_KEY: ${{ secrets.GROWW_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py

      - name: Save Trade Data back to GitHub
        run: |
          git config --global user.name 'MarketBot'
          git config --global user.email 'bot@marketbot.local'
          git add data/*.json
          git commit -m "🤖 Auto-updated portfolio data" || echo "No changes to commit"
          git pull origin main --rebase   # Prevents GitHub upload crashes
          git push