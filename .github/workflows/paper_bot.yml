name: Continuous Forward Testing

on:
  schedule:
    # Boots at 9:15 AM IST (3:45 AM UTC) Mon-Fri
    - cron: '45 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-paper-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # MUST HAVE THIS TO UPDATE THE WEBSITE!
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Run Paper Trading Engine
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_SECRET_KEY: ${{ secrets.GROWW_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_robot.py
          
      - name: Run Paper Trading Engine
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_SECRET_KEY: ${{ secrets.GROWW_SECRET_KEY }}
        run: python paper_robot.py
