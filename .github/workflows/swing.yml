name: Hybrid Swing Engine

on:
  schedule:
    # Runs every 10 minutes between 9:15 AM and 3:30 PM IST (03:45 to 10:00 UTC)
    - cron: '*/10 3-10 * * 1-5'
  workflow_dispatch: 

jobs:
  run-swing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Swing Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
        GROWW_SECRET_KEY: ${{ secrets.GROWW_SECRET_KEY }}
      run: python swing_bot.py