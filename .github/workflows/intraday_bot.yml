name: 9:20 AM Intraday Bot

on:
  schedule:
    # 3:38 AM UTC is 9:08 AM IST (Beats the GitHub traffic jam!)
    - cron: '38 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-intraday:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows the bot to push updates to the dashboard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Intraday Engine
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_SECRET_KEY: ${{ secrets.GROWW_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python intraday_robot.py