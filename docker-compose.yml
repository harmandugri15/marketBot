version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://marketbot:marketbot@db:5432/marketbot
      - TRADING_MODE=${TRADING_MODE:-paper}
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - CAPITAL=${CAPITAL:-200000}
      - GROWW_API_KEY=${GROWW_API_KEY:-}
      - GROWW_SECRET_KEY=${GROWW_SECRET_KEY:-}
      - GROWW_CLIENT_ID=${GROWW_CLIENT_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ALLOWED_ORIGINS=["http://localhost:5173","https://your-domain.com"]
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketbot
      POSTGRES_PASSWORD: marketbot
      POSTGRES_DB: marketbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
