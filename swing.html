<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Portfolio - VCP Bot</title>
  <style>
    :root {
      --bg: #0a0e17; --card: #191e2b; --border: #2a3143; --txt: #f1f4f9; 
      --muted: #94a3b8; --g: #10b981; --r: #ef4444; --b: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; padding: 40px 20px; line-height: 1.5; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p.sub { color: var(--muted); font-size: 14px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .g { color: var(--g); } .r { color: var(--r); } .b { color: var(--b); }
    
    h2 { font-size: 18px; margin-bottom: 16px; margin-top: 40px; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { background: rgba(255,255,255,0.02); color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>End-of-Day Swing Portfolio</h1>
      <p class="sub">Strict Rs 10,000 Cash Account. No Leverage. Scans at 3:15 PM daily.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Equity</div>
        <div class="stat-value" id="tot-equity">...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Available Cash</div>
        <div class="stat-value b" id="avail-cash">...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Invested in Stocks</div>
        <div class="stat-value" id="invested">...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Realized P&L</div>
        <div class="stat-value" id="realized-pnl">...</div>
      </div>
    </div>

    <h2>Active Positions</h2>
    <table id="active-table">
      <thead><tr><th>Date</th><th>Symbol</th><th>Strategy</th><th>Shares</th><th>Entry Price</th><th>Stop Loss</th></tr></thead>
      <tbody><tr><td colspan="6" style="color:var(--muted); text-align:center;">Loading...</td></tr></tbody>
    </table>

    <h2>Closed Trades</h2>
    <table id="closed-table">
      <thead><tr><th>Date</th><th>Symbol</th><th>Exit Reason</th><th>P&L</th></tr></thead>
      <tbody><tr><td colspan="4" style="color:var(--muted); text-align:center;">Loading...</td></tr></tbody>
    </table>
  </div>

  <script>
    async function loadPortfolio() {
      try {
        // Fetch the specific swing database
        const isGH = window.location.hostname.includes("github.io");
        const url = isGH ? 'data/swing_portfolio.json?v=' + new Date().getTime() : 'data/swing_portfolio.json';
        const res = await fetch(url);
        if (!res.ok) throw new Error("No data yet");
        const db = await res.json();

        const trades = db.trades || [];
        const closed = trades.filter(t => t.status === "CLOSED");
        const active = trades.filter(t => t.status === "ACTIVE" || t.status === "WATCHING");

        // Calculate Wallet
        let realizedPnl = 0;
        closed.forEach(t => realizedPnl += (t.realized_pnl || 0));
        
        let runningEquity = (db.capital || 10000) + realizedPnl;
        let investedCash = 0;
        active.forEach(t => investedCash += (t.entry_price * t.shares));
        let availableCash = runningEquity - investedCash;

        // Update UI
        document.getElementById('tot-equity').innerText = 'Rs ' + runningEquity.toFixed(2);
        document.getElementById('avail-cash').innerText = 'Rs ' + availableCash.toFixed(2);
        document.getElementById('invested').innerText = 'Rs ' + investedCash.toFixed(2);
        
        const pnlEl = document.getElementById('realized-pnl');
        pnlEl.innerText = (realizedPnl >= 0 ? '+' : '') + 'Rs ' + realizedPnl.toFixed(2);
        pnlEl.className = 'stat-value ' + (realizedPnl >= 0 ? 'g' : 'r');

        // Render Active Table
        const actTb = document.querySelector('#active-table tbody');
        if (active.length === 0) {
          actTb.innerHTML = '<tr><td colspan="6" style="color:var(--muted); text-align:center;">No active positions.</td></tr>';
        } else {
          actTb.innerHTML = active.slice().reverse().map(t => `
            <tr>
              <td>${t.entry_date || '-'}</td>
              <td style="font-weight:bold;">${t.symbol}</td>
              <td><span class="badge">${t.strategy}</span></td>
              <td>${t.shares}</td>
              <td>Rs ${t.entry_price}</td>
              <td class="r">Rs ${t.stop_loss}</td>
            </tr>
          `).join('');
        }

        // Render Closed Table
        const clsTb = document.querySelector('#closed-table tbody');
        if (closed.length === 0) {
          clsTb.innerHTML = '<tr><td colspan="4" style="color:var(--muted); text-align:center;">No closed trades yet.</td></tr>';
        } else {
          clsTb.innerHTML = closed.slice().reverse().map(t => `
            <tr>
              <td>${t.exit_date || '-'}</td>
              <td style="font-weight:bold;">${t.symbol}</td>
              <td style="color:var(--muted)">${t.exit_reason || 'Manual'}</td>
              <td class="${(t.realized_pnl || 0) >= 0 ? 'g' : 'r'}" style="font-weight:bold;">
                ${(t.realized_pnl || 0) >= 0 ? '+' : ''}Rs ${(t.realized_pnl || 0).toFixed(2)}
              </td>
            </tr>
          `).join('');
        }

      } catch (err) {
        document.querySelector('#active-table tbody').innerHTML = '<tr><td colspan="6" style="color:var(--muted); text-align:center;">No swing data found yet. Wait for the bot to run at 3:15 PM.</td></tr>';
        document.querySelector('#closed-table tbody').innerHTML = '';
      }
    }
    
    loadPortfolio();
  </script>
</body>
</html>
